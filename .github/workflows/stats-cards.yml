name: Update README stats cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Stats card (light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=jamalshahverdiev&count_private=true&show_icons=true&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Top languages card (light)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=jamalshahverdiev&langs_count=10&layout=compact&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin pgpilot-operator
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=pgpilot-operator&hide_border=true&description_lines_count=2
          path: profile/pin-pgpilot-operator.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin freeswitch-iac-platform
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=freeswitch-iac-platform&hide_border=true&description_lines_count=2
          path: profile/pin-freeswitch-iac-platform.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin terraform-provider-freeswitch
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=terraform-provider-freeswitch&hide_border=true&description_lines_count=2
          path: profile/pin-terraform-provider-freeswitch.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin kube-freeze-operator
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=kube-freeze-operator&hide_border=true&description_lines_count=2
          path: profile/pin-kube-freeze-operator.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin wrapter
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=wrapter&hide_border=true&description_lines_count=2
          path: profile/pin-wrapter.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin terraform-provider-superset
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=platacard&repo=terraform-provider-superset&hide_border=true&description_lines_count=2
          path: profile/pin-terraform-provider-superset.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin python-general-public-codes
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=python-general-public-codes&hide_border=true&description_lines_count=2
          path: profile/pin-python-general-public-codes.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin istio-examples
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=istio-examples&hide_border=true&description_lines_count=2
          path: profile/pin-istio-examples.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin aws-cli-bash
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=aws-cli-bash&hide_border=true&description_lines_count=2
          path: profile/pin-aws-cli-bash.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin gcp-bash-codes
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=gcp-bash-codes&hide_border=true&description_lines_count=2
          path: profile/pin-gcp-bash-codes.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin bash-nextgen
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=bash-nextgen&hide_border=true&description_lines_count=2
          path: profile/pin-bash-nextgen.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin azure-powershell
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=azure-powershell&hide_border=true&description_lines_count=2
          path: profile/pin-azure-powershell.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin arm-powershell-codes
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=arm-powershell-codes&hide_border=true&description_lines_count=2
          path: profile/pin-arm-powershell-codes.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Stats card-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=jamalshahverdiev&count_private=true&show_icons=true&hide_border=true&theme=github_dark
          path: profile/stats-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Top languages card-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=jamalshahverdiev&langs_count=10&layout=compact&hide_border=true&theme=github_dark
          path: profile/top-langs-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin pgpilot-operator-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=pgpilot-operator&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-pgpilot-operator-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin freeswitch-iac-platform-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=freeswitch-iac-platform&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-freeswitch-iac-platform-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin terraform-provider-freeswitch-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=terraform-provider-freeswitch&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-terraform-provider-freeswitch-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin kube-freeze-operator-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=kube-freeze-operator&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-kube-freeze-operator-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin wrapter-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=wrapter&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-wrapter-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin terraform-provider-superset-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=platacard&repo=terraform-provider-superset&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-terraform-provider-superset-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin python-general-public-codes-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=python-general-public-codes&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-python-general-public-codes-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin istio-examples-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=istio-examples&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-istio-examples-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin aws-cli-bash-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=aws-cli-bash&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-aws-cli-bash-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin gcp-bash-codes-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=gcp-bash-codes&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-gcp-bash-codes-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin bash-nextgen-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=bash-nextgen&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-bash-nextgen-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin azure-powershell-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=azure-powershell&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-azure-powershell-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pin arm-powershell-codes-dark
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=jamalshahverdiev&repo=arm-powershell-codes&hide_border=true&description_lines_count=2&theme=github_dark
          path: profile/pin-arm-powershell-codes-dark.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Discard broken cards
        run: |
          broken=$(grep -l "Something went wrong" profile/*.svg || true)
          if [ -n "$broken" ]; then
            echo "Reverting broken cards:"; echo "$broken"
            echo "$broken" | xargs git checkout --
          fi

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stats cards" || exit 0
          git push
